# GitHub Actions workflow for tf-triage
# Posts a security and architecture analysis as a PR comment on every pull request.
#
# Requirements:
#   - Terraform/OpenTofu configured in the repo
#   - Ollama (default, no key needed) or set a cloud provider API key as a secret

name: Terraform Plan Analysis

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'

permissions:
  contents: read
  pull-requests: write

jobs:
  tf-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5'
          terraform_wrapper: false

      - name: Install tf-triage
        run: |
          curl -sSfL https://raw.githubusercontent.com/balmha/tf-triage/main/install.sh | bash

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra

      - name: Terraform Plan (JSON)
        run: |
          terraform plan -out=plan.tfplan
          terraform show -json plan.tfplan > plan.json
        working-directory: ./infra

      - name: Run tf-triage analysis
        run: tf-triage -f ./infra/plan.json -p groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Post comment on PR
        run: tf-triage comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
