# GitHub Actions workflow for tf-triage
# Posts a security and architecture analysis as a PR comment on every pull request.
#
# Requirements:
#   - Terraform/OpenTofu configured in the repo
#   - DEEPSEEK_API_KEY set as a repository secret

name: Terraform Plan Analysis

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'

permissions:
  contents: read
  pull-requests: write

jobs:
  tf-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5'
          terraform_wrapper: false

      - name: Install tf-triage
        run: curl -sSfL https://raw.githubusercontent.com/balmha/tf-triage/main/install.sh | bash

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra

      - name: Triage Terraform Plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          terraform plan -json > plan.json
          tf-triage --file plan.json --provider deepseek
          tf-triage comment
        working-directory: ./infra
