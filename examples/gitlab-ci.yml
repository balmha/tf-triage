# GitLab CI pipeline for tf-triage
# Posts a security and architecture analysis as a Merge Request note.
#
# Requirements:
#   - Terraform/OpenTofu configured in the repo
#   - GROQ_API_KEY (or another provider key) set as a CI/CD variable
#   - GITLAB_TOKEN set as a CI/CD variable with 'api' scope
#   - Pipeline must be triggered by a merge request event

stages:
  - plan
  - analyze

variables:
  TF_DIR: "./infra"

terraform-plan:
  stage: plan
  image: hashicorp/terraform:1.5
  script:
    - cd $TF_DIR
    - terraform init
    - terraform plan -out=plan.tfplan
    - terraform show -json plan.tfplan > ../plan.json
  artifacts:
    paths:
      - plan.json
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

tf-triage-analysis:
  stage: analyze
  image: golang:1.21-alpine
  needs:
    - terraform-plan
  before_script:
    - apk add --no-cache curl bash
    - curl -sSfL https://raw.githubusercontent.com/balmha/tf-triage/main/install.sh | bash
  script:
    - tf-triage -f plan.json -p groq
    - tf-triage comment
  variables:
    GROQ_API_KEY: $GROQ_API_KEY
    GITLAB_TOKEN: $GITLAB_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
