# Bitbucket Pipelines configuration for tf-triage
# Posts a security and architecture analysis as a Pull Request comment.
#
# Requirements:
#   - Terraform/OpenTofu configured in the repo
#   - DEEPSEEK_API_KEY set as a repository variable
#   - BITBUCKET_TOKEN set as a repository variable (App Password or Repository Access Token)

image: hashicorp/terraform:1.5

pipelines:
  pull-requests:
    '**':
      - step:
          name: Triage Terraform Plan
          script:
            - cd infra
            - terraform init
            - terraform plan -json > ../plan.json
            - cd ..
            - curl -sSfL https://raw.githubusercontent.com/balmha/tf-triage/main/install.sh | bash
            - tf-triage --file plan.json --provider deepseek
            - tf-triage comment
