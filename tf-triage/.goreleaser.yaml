version: 2
project_name: tf-triage
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: tf-triage
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
brews:
  - repository:
      owner: balmha
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/balmha/tf-triage"
    description: "An AI-powered semantic plan analyzer for Terraform and OpenTofu."
    license: "MIT"
    test: |
      system "#{bin}/tf-triage --version"
  